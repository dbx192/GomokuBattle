<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GomokuBattle — 五子棋对战平台</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Toastr -->
    <link href="https://cdn.jsdelivr.net/npm/toastr@2.1.4/build/toastr.min.css" rel="stylesheet">
    <!-- Custom -->
    <link href="/static/css/main.css" rel="stylesheet">
</head>
<body>

<!-- ═══════════════ NAVBAR ═══════════════ -->
<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container-fluid">
        <a class="navbar-brand" href="#" data-page="home">
            <i class="bi bi-grid-3x3-gap-fill"></i>GomokuBattle
        </a>

        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link active" href="#" data-page="home">
                        <i class="bi bi-house"></i> 首页
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/game">
                        <i class="bi bi-cpu"></i> 人机对战
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/room">
                        <i class="bi bi-people"></i> 房间对战
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#" data-page="rankings">
                        <i class="bi bi-trophy"></i> 排行榜
                    </a>
                </li>
            </ul>

            <ul class="navbar-nav" id="authNav">
                <li class="nav-item" id="loginPrompt">
                    <a class="nav-link" href="#" data-bs-toggle="modal" data-bs-target="#loginModal">
                        <i class="bi bi-box-arrow-in-right"></i> 登录
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- ═══════════════ HOME PAGE ═══════════════ -->
<div id="homePage" class="page-section">

    <!-- Hero -->
    <section class="hero-section">
        <div class="container">
            <h1 class="hero-title">
                <span class="text-gradient">Gomoku</span>Battle
            </h1>
            <p class="hero-subtitle">五子连珠 · 以棋会友 · 零广告纯净对弈体验</p>
        </div>
    </section>

    <div class="container">
        <div class="row g-4">

            <!-- Left: User Panel -->
            <div class="col-lg-3">
                <div id="userPanel">
                    <!-- Logged-in state -->
                    <div id="userInfo" style="display:none;">
                        <div class="card mb-3">
                            <div class="card-body text-center">
                                <div class="user-avatar-placeholder mb-3" id="userAvatar">?</div>
                                <h5 class="mb-1" id="userName">—</h5>
                                <span class="badge bg-primary mb-3" id="userRank">新手</span>

                                <hr class="divider-ink">

                                <div class="row g-2 text-center">
                                    <div class="col-4">
                                        <div class="stat-number" id="userWins">0</div>
                                        <div class="stat-label">胜</div>
                                    </div>
                                    <div class="col-4">
                                        <div class="stat-number" id="userLosses">0</div>
                                        <div class="stat-label">负</div>
                                    </div>
                                    <div class="col-4">
                                        <div class="stat-number" id="userWinRate">0%</div>
                                        <div class="stat-label">胜率</div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Quick Actions -->
                        <div class="card">
                            <div class="card-header">
                                <i class="bi bi-lightning-charge"></i> 快速操作
                            </div>
                            <div class="card-body">
                                <a href="/game" class="btn btn-primary w-100 mb-2">
                                    <i class="bi bi-cpu"></i> 人机对战
                                </a>
                                <a href="/room" class="btn btn-outline-light w-100">
                                    <i class="bi bi-people"></i> 房间对战
                                </a>
                            </div>
                        </div>
                    </div>

                    <!-- Not logged in -->
                    <div id="loginPromptCard">
                        <div class="card mb-3">
                            <div class="card-body text-center py-4">
                                <i class="bi bi-person-circle" style="font-size:3rem;color:var(--text-muted);"></i>
                                <p class="text-muted mt-3 mb-3">登录后开始对弈</p>
                                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#loginModal">
                                    <i class="bi bi-box-arrow-in-right"></i> 登录 / 注册
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Center: Main Content -->
            <div class="col-lg-9">

                <!-- Game Mode Cards -->
                <div class="row g-4 mb-4">
                    <div class="col-md-6">
                        <a href="/game" class="text-decoration-none">
                            <div class="game-mode-card">
                                <i class="bi bi-cpu" style="font-size: 2.5rem;"></i>
                                <h5 class="card-title mt-2">人机对战</h5>
                                <p class="card-text mb-0">与 AI 对弈，磨炼棋艺</p>
                                <small class="text-muted">支持悔棋 · 多难度 · 不限时</small>
                            </div>
                        </a>
                    </div>
                    <div class="col-md-6">
                        <a href="/room" class="text-decoration-none">
                            <div class="game-mode-card">
                                <i class="bi bi-people" style="font-size: 2.5rem;"></i>
                                <h5 class="card-title mt-2">房间对战</h5>
                                <p class="card-text mb-0">创建或加入房间，好友对战</p>
                                <small class="text-muted">6位房间码 · 实时对战 · 观战</small>
                            </div>
                        </a>
                    </div>
                </div>

                <!-- Platform Features -->
                <div class="row g-3 mb-4">
                    <div class="col-sm-4">
                        <div class="card h-100">
                            <div class="card-body text-center py-3">
                                <i class="bi bi-shield-check text-jade" style="font-size:1.5rem;"></i>
                                <h6 class="mt-2 mb-0">零广告</h6>
                                <small class="text-muted">纯净游戏体验</small>
                            </div>
                        </div>
                    </div>
                    <div class="col-sm-4">
                        <div class="card h-100">
                            <div class="card-body text-center py-3">
                                <i class="bi bi-lightning-charge text-gold" style="font-size:1.5rem;"></i>
                                <h6 class="mt-2 mb-0">精确落子</h6>
                                <small class="text-muted">流畅操作体验</small>
                            </div>
                        </div>
                    </div>
                    <div class="col-sm-4">
                        <div class="card h-100">
                            <div class="card-body text-center py-3">
                                <i class="bi bi-bar-chart text-gold" style="font-size:1.5rem;"></i>
                                <h6 class="mt-2 mb-0">段位系统</h6>
                                <small class="text-muted">公平竞技匹配</small>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

<!-- ═══════════════ RANKINGS PAGE ═══════════════ -->
<div id="rankingsPage" class="page-section" style="display:none;">
    <div class="container py-4">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0"><i class="bi bi-trophy"></i> 排行榜</h5>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover mb-0" id="rankingsTableContainer">
                        <thead>
                            <tr>
                                <th style="width:60px;">排名</th>
                                <th>玩家</th>
                                <th>段位</th>
                                <th>胜场</th>
                                <th>负场</th>
                                <th style="width:120px;">胜率</th>
                            </tr>
                        </thead>
                        <tbody id="rankingsTable">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- ═══════════════ LOGIN MODAL ═══════════════ -->
<div class="modal fade" id="loginModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title"><i class="bi bi-box-arrow-in-right"></i> 登录</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="loginForm">
                    <div class="mb-3">
                        <label class="form-label">用户名</label>
                        <input type="text" name="username" class="form-control" placeholder="请输入用户名" required autocomplete="username">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">密码</label>
                        <input type="password" name="password" class="form-control" placeholder="请输入密码" required autocomplete="current-password">
                    </div>
                    <button type="submit" class="btn btn-primary w-100 mt-2">
                        <i class="bi bi-box-arrow-in-right"></i> 登录
                    </button>
                </form>
                <div class="text-center mt-3">
                    <small class="text-muted">还没有账号？
                        <a href="#" class="text-gold" data-bs-toggle="modal" data-bs-target="#registerModal" data-bs-dismiss="modal">立即注册</a>
                    </small>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- ═══════════════ REGISTER MODAL ═══════════════ -->
<div class="modal fade" id="registerModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-success text-white">
                <h5 class="modal-title"><i class="bi bi-person-plus"></i> 注册</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="registerForm">
                    <div class="mb-3">
                        <label class="form-label">用户名</label>
                        <input type="text" name="username" class="form-control" placeholder="请输入用户名" required minlength="2" maxlength="20" autocomplete="username">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">密码</label>
                        <input type="password" name="password" class="form-control" placeholder="请输入密码（至少6位）" required minlength="6" autocomplete="new-password">
                    </div>
                    <button type="submit" class="btn btn-success w-100 mt-2">
                        <i class="bi bi-person-plus"></i> 注册
                    </button>
                </form>
                <div class="text-center mt-3">
                    <small class="text-muted">已有账号？
                        <a href="#" class="text-gold" data-bs-toggle="modal" data-bs-target="#loginModal" data-bs-dismiss="modal">返回登录</a>
                    </small>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- ═══════════════ SCRIPTS ═══════════════ -->
<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/toastr@2.1.4/build/toastr.min.js"></script>
<script src="/static/js/main.js"></script>
</body>
</html>
