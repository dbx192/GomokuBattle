<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人机对战 — GomokuBattle</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/toastr@2.1.4/build/toastr.min.css" rel="stylesheet">
    <link href="/static/css/main.css" rel="stylesheet">
</head>
<body>

<!-- ═══════════════ NAVBAR ═══════════════ -->
<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">
            <i class="bi bi-grid-3x3-gap-fill"></i>GomokuBattle
        </a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="/"><i class="bi bi-house"></i> 首页</a></li>
                <li class="nav-item"><a class="nav-link active" href="/game"><i class="bi bi-cpu"></i> 人机对战</a></li>
                <li class="nav-item"><a class="nav-link" href="/room"><i class="bi bi-people"></i> 房间对战</a></li>
            </ul>
            <ul class="navbar-nav" id="authNav">
                <li class="nav-item">
                    <a class="nav-link" href="/"><i class="bi bi-box-arrow-in-right"></i> 登录</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- ═══════════════ MAIN CONTENT ═══════════════ -->
<div class="container py-4 page-section">
    <div class="row g-4">

        <!-- Left Sidebar -->
        <div class="col-lg-3">
            <!-- Game Controls -->
            <div class="card mb-3">
                <div class="card-header">
                    <i class="bi bi-controller"></i> 游戏控制
                </div>
                <div class="card-body">
                    <button id="startGameBtn" class="btn btn-primary w-100 mb-2">
                        <i class="bi bi-play-fill"></i> 开始对局
                    </button>
                    <div class="d-flex gap-2">
                        <button id="undoBtn" class="btn btn-outline-warning flex-fill" disabled>
                            <i class="bi bi-arrow-counterclockwise"></i> 悔棋
                        </button>
                        <button id="restartBtn" class="btn btn-outline-danger flex-fill">
                            <i class="bi bi-arrow-repeat"></i> 重来
                        </button>
                    </div>
                </div>
            </div>

            <!-- Game Status -->
            <div class="card mb-3">
                <div class="card-header">
                    <i class="bi bi-info-circle"></i> 对局状态
                </div>
                <div class="card-body text-center">
                    <div id="gameStatus">
                        <span class="badge bg-secondary">等待开始</span>
                    </div>
                    <div id="turnIndicator" class="d-flex justify-content-center align-items-center mt-3">
                        <div class="text-center">
                            <span class="piece-black d-inline-block" style="width:32px;height:32px;"></span>
                            <div><small class="text-muted">你</small></div>
                        </div>
                        <div class="text-center mx-3">
                            <span class="badge bg-secondary">VS</span>
                        </div>
                        <div class="text-center">
                            <span class="piece-white d-inline-block" style="width:32px;height:32px;border:2px solid rgba(255,255,255,0.1);"></span>
                            <div><small class="text-muted">AI</small></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Game History -->
            <div class="card" id="historyCard" style="display:none;">
                <div class="card-header">
                    <i class="bi bi-clock-history"></i> 最近对局
                </div>
                <div class="card-body p-0">
                    <div class="list-group list-group-flush" id="gameHistory">
                        <div class="list-group-item text-center text-muted py-3">暂无对局记录</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Center: Game Board -->
        <div class="col-lg-9">
            <div class="d-flex flex-column align-items-center">
                <div id="gameContainer" class="mb-3">
                    <canvas id="gameCanvas" width="640" height="640"></canvas>
                </div>
                <p class="text-muted text-center" style="font-size:0.85rem;">
                    <i class="bi bi-info-circle"></i> 点击棋盘交叉点落子 · 黑棋先手
                </p>
            </div>
        </div>

    </div>
</div>

<!-- ═══════════════ RESULT MODAL ═══════════════ -->
<div class="modal fade" id="resultModal" tabindex="-1" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title">对局结束</h5>
            </div>
            <div class="modal-body text-center py-4">
                <i class="bi bi-trophy-fill" id="resultIcon" style="font-size:3rem;"></i>
                <h4 class="mt-3" id="resultText">—</h4>
                <p class="text-muted mb-0" id="resultDetail">—</p>
            </div>
            <div class="modal-footer justify-content-center">
                <button class="btn btn-primary" data-bs-dismiss="modal" onclick="$('#restartBtn').click()">
                    <i class="bi bi-arrow-repeat"></i> 再来一局
                </button>
                <a href="/" class="btn btn-outline-light">
                    <i class="bi bi-house"></i> 返回首页
                </a>
            </div>
        </div>
    </div>
</div>

<!-- ═══════════════ SCRIPTS ═══════════════ -->
<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/toastr@2.1.4/build/toastr.min.js"></script>
<script src="/static/js/main.js"></script>
<script src="/static/js/game.js"></script>

<!-- ═══════════════ LOGIN MODAL ═══════════════ -->
<div class="modal fade" id="loginModal" tabindex="-1" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title"><i class="bi bi-box-arrow-in-right"></i> 登录后开始对弈</h5>
                <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p class="text-muted small mb-3">
                    <i class="bi bi-info-circle"></i> 人机对战需要登录后才能开始
                </p>
                <form id="loginForm">
                    <div class="mb-3">
                        <label class="form-label">用户名</label>
                        <input type="text" name="username" class="form-control" placeholder="请输入用户名" required autocomplete="username">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">密码</label>
                        <input type="password" name="password" class="form-control" placeholder="请输入密码" required autocomplete="current-password">
                    </div>
                    <button type="submit" class="btn btn-primary w-100 mt-2">
                        <i class="bi bi-box-arrow-in-right"></i> 登录
                    </button>
                </form>
                <div class="text-center mt-3">
                    <small class="text-muted">还没有账号？
                        <a href="#" class="text-gold" data-bs-toggle="modal" data-bs-target="#registerModal" data-bs-dismiss="modal">立即注册</a>
                    </small>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- ═══════════════ REGISTER MODAL ═══════════════ -->
<div class="modal fade" id="registerModal" tabindex="-1" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-success text-white">
                <h5 class="modal-title"><i class="bi bi-person-plus"></i> 注册</h5>
                <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="registerForm">
                    <div class="mb-3">
                        <label class="form-label">用户名</label>
                        <input type="text" name="username" class="form-control" placeholder="请输入用户名" required minlength="2" maxlength="20" autocomplete="username">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">密码</label>
                        <input type="password" name="password" class="form-control" placeholder="请输入密码（至少6位）" required minlength="6" autocomplete="new-password">
                    </div>
                    <button type="submit" class="btn btn-success w-100 mt-2">
                        <i class="bi bi-person-plus"></i> 注册
                    </button>
                </form>
                <div class="text-center mt-3">
                    <small class="text-muted">已有账号？
                        <a href="#" class="text-gold" data-bs-toggle="modal" data-bs-target="#loginModal" data-bs-dismiss="modal">返回登录</a>
                    </small>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
